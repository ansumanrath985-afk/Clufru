<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLUFRU | Web & App Development</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;

            /* TECH BACKGROUND IMAGE */
            background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            color: white;
        }

        /* DARK OVERLAY FOR READABILITY */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        header {
            text-align: center;
            padding: 60px 20px;
        }

        h1 {
            font-size: 50px;
            letter-spacing: 2px;
        }

        p {
            font-size: 18px;
            margin-top: 10px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #00c3ff;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
        }

        .btn:hover {
            background: #00a3d1;
        }

        section {
            text-align: center;
            padding: 50px 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1>CLUFRU</h1>
        <p>We Build Websites & Mobile Apps for Your Business</p>
        <a class="btn" href="#">Get Your Website</a>
    </header>

    <section>
        <h2>About Us</h2>
        <p>
            CLUFRU is a tech service where we create modern websites and apps for businesses like bakeries,
            shops, and startups at affordable prices.
        </p>
    </section>

</body>
</html>
