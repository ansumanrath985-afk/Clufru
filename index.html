<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLUFRU | Web & App Development</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            color: white;

            background: url('https://images.unsplash.com/photo-1518770660439-4636190af475') no-repeat center center fixed;
            background-size: cover;
        }

        /* dark overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 80px 20px;
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 18px;
            margin-top: 10px;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: #00c3ff;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
        }

        .btn:hover {
            background: #00a3d1;
        }

        .contact {
            margin-top: 20px;
            color: #ddd;
            font-size: 16px;
            line-height: 1.6;
        }

        section {
            margin-top: 60px;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="content">
    <h1>CLUFRU</h1>
    <p>We Build Websites & Mobile Apps for Your Business</p>

    <a class="btn" href="#">Get Your Website</a>

    <div class="contact">
        <p><b>Owner:</b> Anshuman Rath</p>
        <p><b>Email:</b> clufru@gmail.com</p>
    </div>

    <section>
        <h2>About Us</h2>
        <p>
            CLUFRU creates modern websites and apps for businesses like bakeries, shops, and startups at affordable prices.
        </p>
    </section>
</div>

</body>
</html>
